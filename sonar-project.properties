# Sonar configuration for Otterblade Odyssey
sonar.projectKey=arcade-cabinet_otterblade-odyssey
sonar.organization=arcade-cabinet

# Project metadata
sonar.projectName=Otterblade Odyssey
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=apps,packages
sonar.tests=tests,e2e
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/*.spec.ts,**/*.spec.tsx

# Exclude patterns
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/*.spec.ts,**/*.spec.tsx,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/public/**,**/__mocks__/**,**/pocs/**,**/proofs/**

# Coverage exclusions
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/public/**,**/__mocks__/**,**/pocs/**,**/proofs/**,**/types/**,**/*.d.ts

# TypeScript/JavaScript settings
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Security: Ignore known false positives
# Exclude test files from security analysis
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/*.spec.ts,**/*.spec.tsx

# Code duplication
sonar.cpd.skip=false

# Encoding
sonar.sourceEncoding=UTF-8

# Analysis settings
sonar.scm.provider=git
sonar.scm.forceReloadAll=false

# Security hotspots - exclude dev dependencies and test files
sonar.security.hotspots.inheritance=NONE

# Quality gates
sonar.qualitygate.wait=false
